<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8ecec"/><stop offset="100%" stop-color="#f0ebe4"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Classroom desk scene -->
  <rect y="310" width="800" height="20" fill="#c8b898" opacity="0.7"/>
  <rect y="330" width="800" height="170" fill="#e0d4c0" opacity="0.5"/>
  <!-- Paper with marks -->
  <rect x="250" y="248" width="300" height="220" rx="4" fill="#faf8f4" transform="rotate(-3 400 358)"/>
  <!-- Red X marks on paper -->
  <line x1="310" y1="285" x2="330" y2="305" stroke="#c06060" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="330" y1="285" x2="310" y2="305" stroke="#c06060" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="355" y1="285" x2="375" y2="305" stroke="#c06060" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="375" y1="285" x2="355" y2="305" stroke="#c06060" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Lines on paper -->
  <line x1="270" y1="330" x2="460" y2="330" stroke="#d0c8b8" stroke-width="1.5"/>
  <line x1="270" y1="345" x2="430" y2="345" stroke="#d0c8b8" stroke-width="1.5"/>
  <line x1="270" y1="360" x2="450" y2="360" stroke="#d0c8b8" stroke-width="1.5"/>
  <!-- Child sitting, slouched, looking confused/sad -->
  <path d="M358 175 Q398 158 438 175 L446 315 Q398 306 350 315 Z" fill="#a8c4b8"/>
  <circle cx="398" cy="152" r="32" fill="#f0d4b4"/>
  <ellipse cx="398" cy="130" rx="32" ry="16" fill="#4a3020"/>
  <ellipse cx="370" cy="144" rx="11" ry="18" fill="#4a3020"/>
  <!-- Confused furrowed brow -->
  <path d="M387 148 Q390 144 394 148" stroke="#3a2410" stroke-width="2.5" fill="none"/>
  <path d="M402 148 Q406 144 410 148" stroke="#3a2410" stroke-width="2.5" fill="none"/>
  <!-- Downturned mouth -->
  <path d="M389 163 Q398 158 407 163" stroke="#3a2410" stroke-width="2" fill="none"/>
  <!-- Arm resting on desk, head on hand -->
  <path d="M358 198 Q330 238 312 268" stroke="#f0d4b4" stroke-width="22" stroke-linecap="round" fill="none"/>
  <ellipse cx="306" cy="276" rx="22" ry="14" fill="#f0d4b4"/>
  <path d="M438 198 Q465 232 474 268" stroke="#f0d4b4" stroke-width="20" stroke-linecap="round" fill="none"/>
</svg>