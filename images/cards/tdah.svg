<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8f0ec"/><stop offset="100%" stop-color="#f4ede4"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="360" width="800" height="140" fill="#ddd0c0" opacity="0.5"/>
  <!-- Scattered toys on floor (ADHD energy) -->
  <rect x="80" y="380" width="40" height="30" rx="4" fill="#c8a870" opacity="0.7" transform="rotate(-15 100 395)"/>
  <circle cx="600" cy="400" r="22" fill="#a8c0b4" opacity="0.6"/>
  <rect x="620" y="370" width="30" height="20" rx="3" fill="#b8a888" opacity="0.5" transform="rotate(20 635 380)"/>
  <!-- Child running/jumping - energetic pose -->
  <!-- Shadow -->
  <ellipse cx="400" cy="400" rx="60" ry="14" fill="#c0b0a0" opacity="0.3"/>
  <!-- Legs in motion -->
  <path d="M380 360 Q365 390 350 405" stroke="#e8c9a8" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M420 355 Q440 382 455 392" stroke="#e8c9a8" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Shorts -->
  <path d="M365 340 Q400 320 435 340 L440 370 Q400 360 360 370 Z" fill="#7a9e90"/>
  <!-- Body / shirt -->
  <path d="M368 220 Q400 200 432 220 L440 340 Q400 328 360 340 Z" fill="#a8c4b8"/>
  <!-- Arms in motion -->
  <path d="M368 240 Q340 260 325 290" stroke="#e8c9a8" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M432 240 Q460 258 472 284" stroke="#e8c9a8" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <circle cx="400" cy="195" r="38" fill="#f0d4b4"/>
  <!-- Hair -->
  <ellipse cx="400" cy="168" rx="38" ry="18" fill="#4a3020"/>
  <ellipse cx="366" cy="188" rx="14" ry="22" fill="#4a3020"/>
  <!-- Big smile, bright eyes -->
  <circle cx="387" cy="192" r="5" fill="#3a2810"/>
  <circle cx="413" cy="192" r="5" fill="#3a2810"/>
  <circle cx="389" cy="190" r="2" fill="white"/>
  <circle cx="415" cy="190" r="2" fill="white"/>
  <path d="M388 204 Q400 214 412 204" stroke="#3a2810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Motion lines -->
  <line x1="460" y1="170" x2="490" y2="165" stroke="#c8b898" stroke-width="2" opacity="0.5"/>
  <line x1="462" y1="182" x2="496" y2="182" stroke="#c8b898" stroke-width="2" opacity="0.4"/>
  <line x1="460" y1="194" x2="488" y2="200" stroke="#c8b898" stroke-width="2" opacity="0.3"/>
</svg>