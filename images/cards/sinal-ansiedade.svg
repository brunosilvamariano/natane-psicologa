  <!-- Wide worried eyes -->
  <circle cx="436" cy="236" r="5.5" fill="#3a2810"/>
  <circle cx="454" cy="236" r="5.5" fill="#3a2810"/>
  <circle cx="437" cy="234" r="2" fill="white"/>
  <circle cx="455" cy="234" r="2" fill="white"/>
  <path d="M437 248 Q445 244 453 248" stroke="#3a2810" stroke-width="1.5" fill="none"/>
  <!-- Small hand clutching parent -->
