<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e4e8ec"/><stop offset="100%" stop-color="#ede8e0"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect y="350" width="800" height="150" fill="#d8ccba" opacity="0.4"/>
  <!-- Child hiding behind parent's leg / anxious posture -->
  <!-- Parent leg -->
  <rect x="290" y="200" width="70" height="300" rx="35" fill="#8a9e96" opacity="0.8"/>
  <rect x="370" y="200" width="70" height="300" rx="35" fill="#8a9e96" opacity="0.7"/>
  <!-- Parent torso and head -->
  <path d="M278 80 Q340 58 402 80 L410 208 Q340 198 270 208 Z" fill="#9aada8"/>
  <circle cx="340" cy="56" r="36" fill="#c8906a"/>
  <ellipse cx="340" cy="30" rx="36" ry="18" fill="#2e1e10"/>
  <!-- Child peeking from behind parent leg, worried -->
  <path d="M412 260 Q445 245 478 260 L482 370 Q445 362 408 370 Z" fill="#a8c4b8"/>
