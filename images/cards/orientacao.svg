  <ellipse cx="366" cy="204" rx="10" ry="16" fill="#5a3820"/>
  <circle cx="381" cy="211" r="4" fill="#3a2810"/>
  <circle cx="399" cy="211" r="4" fill="#3a2810"/>
  <circle cx="382" cy="209" r="1.5" fill="white"/>
  <circle cx="400" cy="209" r="1.5" fill="white"/>
  <path d="M381 222 Q390 228 399 222" stroke="#3a2810" stroke-width="2" fill="none"/>
  <!-- Child arms held by parents -->
  <path d="M352 252 Q320 270 300 290" stroke="#f0d4b4" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M428 252 Q460 270 480 290" stroke="#f0d4b4" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Mom (right) -->
  <path d="M468 140 Q512 122 556 140 L562 360 Q512 350 462 360 Z" fill="#b0a898"/>
  <circle cx="512" cy="116" r="36" fill="#d4a880"/>
  <ellipse cx="512" cy="90" rx="36" ry="20" fill="#3a2010"/>
  <ellipse cx="482" cy="108" rx="13" ry="22" fill="#3a2010"/>
  <ellipse cx="544" cy="108" rx="13" ry="22" fill="#3a2010"/>
  <circle cx="500" cy="114" r="4.5" fill="#2e1a0a"/>
  <circle cx="524" cy="114" r="4.5" fill="#2e1a0a"/>
  <path d="M500 127 Q512 134 524 127" stroke="#2e1a0a" stroke-width="2" fill="none"/>
  <!-- Mom arm holding child -->
  <path d="M468 162 Q435 210 410 288" stroke="#d4a880" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M556 162 Q584 206 594 254" stroke="#d4a880" stroke-width="22" stroke-linecap="round" fill="none"/>
</svg>