<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" fill="none">
  <!-- Background shape -->
  <rect x="30" y="30" width="420" height="500" rx="180" fill="url(#portrait-bg)" opacity="0.2"/>
  <rect x="0" y="60" width="400" height="460" rx="200" fill="url(#portrait-bg2)" opacity="0.12"/>
  
  <!-- Backdrop organic shape -->
  <path d="M 60 100 Q 80 40 200 50 Q 350 45 400 120 Q 460 200 450 380 Q 440 480 340 510 Q 220 540 120 490 Q 40 450 50 320 Q 45 200 60 100 Z" fill="#d4c4b0" opacity="0.35"/>

  <!-- Clothes/body base -->
  <path d="M 150 560 Q 140 480 145 440 Q 155 390 200 370 Q 230 360 240 358 Q 250 360 280 370 Q 325 390 335 440 Q 340 480 330 560 Z" fill="#8fa89e" opacity="0.85"/>
  <!-- Collar/neckline -->
  <path d="M 200 370 Q 215 390 240 395 Q 265 390 280 370 Q 260 385 240 387 Q 220 385 200 370 Z" fill="#7a9890" opacity="0.9"/>

  <!-- Neck -->
  <rect x="225" y="340" width="30" height="35" rx="10" fill="#d4b896" opacity="0.9"/>
  
  <!-- Face -->
  <ellipse cx="240" cy="290" rx="75" ry="88" fill="#e0c9af" opacity="0.95"/>
  <!-- Face shading -->
  <ellipse cx="250" cy="300" rx="55" ry="65" fill="#d4b896" opacity="0.4"/>
  
  <!-- Hair - long flowing -->
  <path d="M 168 270 Q 158 220 162 175 Q 170 130 200 110 Q 218 100 240 98 Q 262 100 280 110 Q 310 130 318 175 Q 322 220 312 270 Q 295 240 280 230 Q 260 215 240 215 Q 220 218 200 230 Q 185 240 168 270 Z" fill="#4a3428" opacity="0.85"/>
  <!-- Hair sides flowing down -->
  <path d="M 168 270 Q 155 320 158 380 Q 162 420 170 450 Q 160 420 158 380 Q 152 320 168 270 Z" fill="#4a3428" opacity="0.75"/>
  <path d="M 312 270 Q 325 320 322 380 Q 318 420 310 450 Q 320 420 322 380 Q 328 320 312 270 Z" fill="#4a3428" opacity="0.75"/>
  <!-- Hair highlights -->
  <path d="M 205 115 Q 220 105 240 103 Q 255 115 248 130 Q 238 118 225 120 Q 210 125 205 115 Z" fill="#6a4838" opacity="0.5"/>

  <!-- Eyebrows -->
  <path d="M 205 265 Q 215 260 228 263" stroke="#4a3428" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 252 263 Q 265 260 275 265" stroke="#4a3428" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Eyes -->
  <ellipse cx="218" cy="278" rx="12" ry="9" fill="#fff" opacity="0.95"/>
  <ellipse cx="262" cy="278" rx="12" ry="9" fill="#fff" opacity="0.95"/>
  <circle cx="220" cy="279" r="7" fill="#4a3428" opacity="0.9"/>
  <circle cx="264" cy="279" r="7" fill="#4a3428" opacity="0.9"/>
  <circle cx="222" cy="277" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="266" cy="277" r="2.5" fill="#fff" opacity="0.9"/>
  <!-- Eyelashes suggestion -->
  <path d="M 208 274 Q 210 270 214 272" stroke="#4a3428" stroke-width="1" opacity="0.7"/>
  <path d="M 250 272 Q 258 270 268 274" stroke="#4a3428" stroke-width="1" opacity="0.7"/>

  <!-- Nose -->
  <path d="M 237 285 Q 232 308 234 318 Q 238 322 246 322 Q 250 318 248 308 Q 245 295 240 285 Z" fill="#c4a078" opacity="0.3"/>
  
  <!-- Smile / gentle expression -->
  <path d="M 220 330 Q 230 340 240 342 Q 250 340 260 330" stroke="#c4908a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Cheek warmth -->
  <ellipse cx="200" cy="310" rx="18" ry="12" fill="#e0a898" opacity="0.15"/>
  <ellipse cx="280" cy="310" rx="18" ry="12" fill="#e0a898" opacity="0.15"/>

  <!-- Earrings suggestion -->
  <circle cx="166" cy="295" r="4" fill="#c4a882" opacity="0.7"/>
  <circle cx="166" cy="303" r="3" fill="#b09070" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="120" r="5" fill="#8fa89e" opacity="0.4"/>
  <circle cx="410" cy="150" r="4" fill="#c4a882" opacity="0.4"/>
  <circle cx="80" cy="440" r="6" fill="#8fa89e" opacity="0.3"/>
  <circle cx="400" cy="460" r="5" fill="#c4a882" opacity="0.35"/>

  <!-- Botanical element -->
  <path d="M 30 300 Q 50 270 65 285 Q 55 310 30 300 Z" fill="#8fa89e" opacity="0.5"/>
  <path d="M 420 200 Q 445 175 458 190 Q 448 215 420 200 Z" fill="#c4a882" opacity="0.45"/>

  <defs>
    <radialGradient id="portrait-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4c4b0"/>
      <stop offset="100%" stop-color="#8fa89e"/>
    </radialGradient>
    <radialGradient id="portrait-bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#8fa89e"/>
    </radialGradient>
  </defs>
</svg>
